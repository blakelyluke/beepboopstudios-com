<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bb-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#a78bfa"/>
      <stop offset="0.5" stop-color="#3b82f6"/>
      <stop offset="1"   stop-color="#2dd4bf"/>
    </linearGradient>
    <radialGradient id="bb-eye" cx="0.32" cy="0.28" r="0.85">
      <stop offset="0"   stop-color="#ffffff"/>
      <stop offset="0.6" stop-color="#ffffff"/>
      <stop offset="1"   stop-color="#e5e7ff"/>
    </radialGradient>
  </defs>

  <!-- Antenna -->
  <line x1="32" y1="2" x2="32" y2="9"
        stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.92"/>
  <circle cx="32" cy="2.5" r="2.6" fill="#ffffff"/>

  <!-- Head -->
  <rect x="6" y="10" width="52" height="50" rx="13"
        fill="url(#bb-bg)"/>
  <!-- Inner trim line for depth -->
  <rect x="9" y="13" width="46" height="44" rx="10"
        fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>

  <!-- Eyes -->
  <circle cx="22" cy="32" r="6.5" fill="url(#bb-eye)"/>
  <circle cx="42" cy="32" r="6.5" fill="url(#bb-eye)"/>
  <!-- Eye shines -->
  <circle cx="20"   cy="29.5" r="1.6" fill="#ffffff"/>
  <circle cx="40"   cy="29.5" r="1.6" fill="#ffffff"/>

  <!-- Subtle smile -->
  <path d="M 22 47 Q 32 52 42 47"
        stroke="#ffffff" stroke-width="2.4" fill="none"
        stroke-linecap="round" opacity="0.72"/>
</svg>
